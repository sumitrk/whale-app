name: TranscribeMeeting
options:
  bundleIdPrefix: com.sumitrk
  deploymentTarget:
    macOS: "14.2"
  defaultConfig: Debug

settings:
  base:
    PRODUCT_NAME: TranscribeMeeting
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.2"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""  # XcodeGen will use your default team

targets:
  TranscribeMeeting:
    type: application
    platform: macOS
    sources:
      - path: TranscribeMeeting/Sources
    resources:
      - path: TranscribeMeeting/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sumitrk.transcribe-meeting
        INFOPLIST_FILE: TranscribeMeeting/Info.plist
        CODE_SIGN_ENTITLEMENTS: TranscribeMeeting/TranscribeMeeting.entitlements
        # Hide dock icon — menu bar only
        LSUIElement: YES
    dependencies:
      - sdk: CoreAudio.framework
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
    entitlements:
      path: TranscribeMeeting/TranscribeMeeting.entitlements
