name: TranscribeMeeting
options:
  bundleIdPrefix: com.sumitrk
  deploymentTarget:
    macOS: "14.2"
  defaultConfig: Debug

settings:
  base:
    PRODUCT_NAME: TranscribeMeeting
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.2"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "G6Z6DNHM33"
    OTHER_CODE_SIGN_FLAGS: '--requirements "=designated => identifier \"com.sumitrk.transcribe-meeting\" and anchor apple generic and certificate leaf[subject.OU] = \"G6Z6DNHM33\""'

targets:
  TranscribeMeeting:
    type: application
    platform: macOS
    sources:
      - path: TranscribeMeeting/Sources
    resources:
      - path: TranscribeMeeting/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sumitrk.transcribe-meeting
        INFOPLIST_FILE: TranscribeMeeting/Info.plist
        CODE_SIGN_ENTITLEMENTS: TranscribeMeeting/TranscribeMeeting.entitlements
        # Hide dock icon — menu bar only
        LSUIElement: YES
    dependencies:
      - sdk: CoreAudio.framework
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
    postBuildScripts:
      - name: Copy Python Server Binary (if built)
        script: |
          BINARY_DIR="${SRCROOT}/dist/transcribe_server"
          DEST="${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Resources/transcribe_server"
          if [ -d "$BINARY_DIR" ]; then
            echo "Bundling Python server binary from $BINARY_DIR"
            rm -rf "$DEST"
            cp -r "$BINARY_DIR" "$DEST"
          else
            echo "No dist/transcribe_server found — app will use Python fallback (dev mode)"
          fi
